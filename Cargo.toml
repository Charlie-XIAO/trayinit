[dependencies]
once_cell = "1.21"

[dev-dependencies]
winit = "0.30"

[target.'cfg(windows)'.dependencies.windows-sys]
version = "0.60"
features = [
  "Win32_UI_WindowsAndMessaging",
  "Win32_Foundation",
  "Win32_System_SystemServices",
  "Win32_System_SystemInformation",
  "Win32_System_LibraryLoader",
  "Win32_UI_Accessibility",
  "Win32_UI_Controls",
  "Win32_UI_HiDpi",
  "Win32_UI_Shell",
  "Win32_Graphics_Gdi",
]
