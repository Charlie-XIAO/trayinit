[package]
name = "trayinit"
version = "0.1.0"
edition = "2024"

[dependencies]
once_cell = "1.21"
dpi = "0.1"
keyboard-types = "0.7"

[dev-dependencies]
winit = "0.30"

[target."cfg(target_os = \"windows\")".dependencies.windows-sys]
version = "0.60"
features = [
  "Win32_UI_WindowsAndMessaging",
  "Win32_UI_Input_KeyboardAndMouse",
  "Win32_Foundation",
  "Win32_System_SystemServices",
  "Win32_System_SystemInformation",
  "Win32_System_LibraryLoader",
  "Win32_UI_Accessibility",
  "Win32_UI_Controls",
  "Win32_UI_HiDpi",
  "Win32_UI_Shell",
  "Win32_Graphics_Gdi",
]
